# Railway config for galaxy-web (frontend).
# galaxyonlineiii (API) uses Railway service variables:
#   RAILWAY_BUILD_COMMAND = npm run build:api
#   RAILWAY_PRE_DEPLOY_COMMAND = npm run db:migrate:deploy
#   RAILWAY_START_COMMAND = npm run start:api

[build]
builder = "RAILPACK"
buildCommand = "npm run build:web"

[deploy]
startCommand = "npm run start:web"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
