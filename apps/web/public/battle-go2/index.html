<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Online 2 - Simulador de Batalla Espacial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #040814;
    --purple-nebula: #4a1a6b;
    --blue-deep: #0a0e2a;
    --gold: #f0c040;
    --gold-dim: #907020;
    --red: #e04040;
    --green: #40e080;
    --cyan: #40c0e0;
    --white: #d0d8f0;
  }

  body {
    background: var(--bg-dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    width: 100%;
    max-width: 1100px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    background: linear-gradient(180deg, rgba(8,16,40,0.98) 0%, rgba(6,10,28,0.95) 100%);
    border-bottom: 2px solid #1a3060;
    position: relative;
    z-index: 100;
  }

  .player-side {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .player-side.right { flex-direction: row-reverse; text-align: right; }

  .player-portrait {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    border: 2px solid var(--gold);
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a2040, #0a1020);
    box-shadow: 0 0 8px rgba(240,192,64,0.25);
    flex-shrink: 0;
  }
  .player-portrait .level-badge {
    position: absolute;
    bottom: -3px;
    right: -3px;
    background: var(--gold);
    color: #000;
    font-size: 8px;
    font-weight: 900;
    padding: 1px 3px;
    border-radius: 2px;
    font-family: 'Orbitron', sans-serif;
  }

  .player-info { display: flex; flex-direction: column; gap: 1px; }
  .player-side.right .player-info { align-items: flex-end; }

  .player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 6px rgba(240,192,64,0.4);
  }
  .player-name.defender { color: #ff8080; text-shadow: 0 0 6px rgba(255,80,80,0.4); }

  .player-stars { display: flex; gap: 1px; font-size: 10px; }
  .star { color: var(--gold); text-shadow: 0 0 3px rgba(240,192,64,0.5); }
  .star.empty { color: #333; }

  .player-ships {
    display: flex;
    gap: 3px;
    margin-top: 1px;
  }
  .mini-ship-icon {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 3px rgba(0,0,0,0.8);
  }

  /* Center Section */
  .center-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 320px;
  }

  .round-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(240,192,64,0.7), 0 0 20px rgba(240,192,64,0.3);
    letter-spacing: 4px;
    animation: pulse-gold 2.5s ease-in-out infinite;
  }

  @keyframes pulse-gold {
    0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px rgba(240,192,64,0.7); }
    50% { opacity: 0.8; transform: scale(1.02); text-shadow: 0 0 20px rgba(240,192,64,0.9); }
  }

  .hp-bar-container {
    width: 100%;
    height: 16px;
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    border: 1px solid rgba(240,192,64,0.2);
    overflow: hidden;
    display: flex;
    position: relative;
  }

  .hp-bar-left {
    height: 100%;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #0a4080, #2080d0, #40a0f0, #2080d0, #0a4080);
    border-radius: 8px 0 0 8px;
  }
  .hp-bar-right {
    height: 100%;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #802020, #d04040, #f06060, #d04040, #802020);
    border-radius: 0 8px 8px 0;
  }

  .hp-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
    white-space: nowrap;
    z-index: 5;
  }

  .hp-values {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 9px;
    color: #88aacc;
    font-family: 'Orbitron', sans-serif;
  }

  /* ===== GAME AREA ===== */
  .game-container {
    position: relative;
    width: 100%;
    max-width: 1100px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  #battleCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ===== FLOATING DAMAGE ===== */
  .floating-damage {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 16px;
    pointer-events: none;
    animation: float-up-damage 1.4s ease-out forwards;
    text-shadow: 0 0 8px currentColor, 0 0 16px currentColor, 0 2px 4px rgba(0,0,0,0.8);
    z-index: 1000;
    letter-spacing: 1px;
  }

  @keyframes float-up-damage {
    0% { opacity: 1; transform: translateY(0) scale(0.3); }
    15% { transform: translateY(-8px) scale(1.4); }
    35% { transform: translateY(-20px) scale(1.05); }
    100% { opacity: 0; transform: translateY(-55px) scale(0.7); }
  }

  /* ===== BOTTOM CONTROLS ===== */
  .bottom-controls {
    width: 100%;
    max-width: 1100px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: linear-gradient(0deg, rgba(8,16,40,0.95) 0%, rgba(5,10,25,0.9) 100%);
    border-top: 1px solid #1a3060;
    position: relative;
    z-index: 100;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .control-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid #2a4080;
    background: linear-gradient(145deg, rgba(25,45,90,0.85), rgba(12,20,50,0.9));
    color: var(--gold);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    font-family: 'Orbitron', sans-serif;
  }
  .control-btn:hover {
    background: linear-gradient(145deg, rgba(40,70,140,0.9), rgba(20,35,70,0.95));
    border-color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 0 12px rgba(240,192,64,0.25);
  }
  .control-btn:active { transform: translateY(1px); }
  .control-btn.active {
    background: linear-gradient(145deg, rgba(240,192,64,0.25), rgba(180,150,40,0.2));
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(240,192,64,0.35);
  }

  .btn-label {
    font-size: 10px;
    color: #6688aa;
    font-family: 'Orbitron', sans-serif;
    margin-right: 6px;
  }

  /* Timeline */
  .timeline {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .timeline-dot {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid rgba(60,90,160,0.5);
    background: rgba(15,25,55,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-family: 'Orbitron', sans-serif;
    color: #5577aa;
    transition: all 0.3s;
    cursor: default;
  }
  .timeline-dot.current {
    border-color: var(--gold);
    background: rgba(240,192,64,0.18);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(240,192,64,0.3);
    animation: pulse-gold 1.5s infinite;
  }
  .timeline-dot.won-left {
    background: rgba(20,80,180,0.45);
    border-color: #3080d0;
    color: #60b0ff;
  }
  .timeline-dot.won-right {
    background: rgba(180,40,40,0.45);
    border-color: #d04040;
    color: #ff7070;
  }

  /* Stats overlay */
  .stats-overlay {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(8,14,35,0.82);
    border: 1px solid rgba(40,70,140,0.4);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 10px;
    font-family: 'Orbitron', sans-serif;
    z-index: 150;
    backdrop-filter: blur(6px);
    min-width: 130px;
  }
  .stats-overlay div {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
    color: #6080a0;
  }
  .stats-overlay span { color: var(--gold); }

  /* Phase indicator */
  .phase-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,64,0.9), 0 0 60px rgba(240,192,64,0.5);
    pointer-events: none;
    z-index: 250;
    opacity: 0;
    white-space: nowrap;
  }
  .phase-indicator.animating {
    animation: phase-show 2.5s ease-out forwards;
  }

  @keyframes phase-show {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    18% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
    35% { transform: translate(-50%, -50%) scale(1); }
    85% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .top-bar { height: 52px; padding: 0 6px; }
    .player-portrait { width: 36px; height: 36px; }
    .player-name { font-size: 10px; }
    .center-section { min-width: 180px; }
    .round-badge { font-size: 11px; letter-spacing: 2px; }
    .hp-bar-container { height: 12px; }
    .bottom-controls { height: 44px; padding: 0 8px; }
    .control-btn { width: 32px; height: 32px; font-size: 12px; }
    .timeline-dot { width: 16px; height: 16px; font-size: 7px; }
    .stats-overlay { display: none; }
  }
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="top-bar">
  <!-- Left Player (Attacker) -->
  <div class="player-side left">
    <div class="player-portrait">
      <div style="width:100%;height:100%;background:linear-gradient(135deg,#d06040,#902010);display:flex;align-items:center;justify-content:center;font-size:18px;">&#x1F608;</div>
      <div class="level-badge">30</div>
    </div>
    <div class="player-info">
      <div class="player-name">SandoraD</div>
      <div class="player-stars">
        <span class="star">&#9733;</span><span class="star">&#9733;</span><span class="star">&#9733;</span>
        <span class="star">&#9733;</span><span class="star">&#9733;</span><span class="star">&#9733;</span>
        <span class="star">&#9733;</span><span class="star empty">&#9734;</span><span class="star empty">&#9734;</span>

        <div class="mini-ship-icon" style="background:linear-gradient(135deg,#2080c0,#104080);">C</div>

      </div>

  <!-- Center HP + Round -->
  <div class="center-section">

      <span id="hpValueLeft">17,600 / 17,600</span>

  <!-- Right Player (Defender) -->
  <div class="player-side right">

  <div class="stats-overlay" id="statsOverlay">

<script>
// ========================================================================
// GALAXY ONLINE 2 - BATTLE SIMULATOR v2
// ========================================================================

const canvas = document.getElementById('battleCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

let W, H, animTime = 0;
let paused = false, speed = 1, round = 1;
const MAX_ROUNDS = 10;
let phase = 'IDLE';
let roundWinners = [];

// Collections
let stars = [], particles = [], projectiles = [], explosions = [];

// ========================================================================
// SHIP DEFINITIONS - Exact numbers from reference images
// ========================================================================

const ATTK_NAMES = ['800','800','700','700','1000','1000'];
const DEF_NAMES  = ['1700','1700','3000','3000','5250','5850'];

function createFleet(isAttacker) {
  const counts = isAttacker ? [800,800,700,700,1000,1000] : [1700,1700,3000,3000,5250,5850];
  const types = ['FRIGATE','FRIGATE','FRIGATE','CRUISER','CRUISER','BATTLESHIP'];
  const hpBase = { FRIGATE: 500, CRUISER: 1000, BATTLESHIP: 2000 };
  const dmgBase = { FRIGATE: 120, CRUISER: 280, BATTLESHIP: 500 };
  const atkType = { FRIGATE: 'ballistic', CRUISER: 'directional', BATTLESHIP: 'missile' };
  const sizes = { FRIGATE: 22, CRUISER: 30, BATTLESHIP: 38 };

  return types.map((type, i) => ({
    id: i,
    type,
    name: (isAttacker ? ATTK_NAMES : DEF_NAMES)[i],
    count: counts[i],
    maxCount: counts[i],
    hp: hpBase[type] * Math.ceil(counts[i] / 200),
    maxHp: hpBase[type] * Math.ceil(counts[i] / 200),
    damage: dmgBase[type],
    attackType: atkType[type],
    size: sizes[type],
    isAttacker,
    alive: true,
    attacking: false,
    hitFlash: 0,
    x: 0, y: 0,
  }));
}

let attackerFleet = createFleet(true);
let defenderFleet = createFleet(false);

// ========================================================================
// FORMATION - Staggered, like reference image
// ========================================================================

function computePositions() {
  const marginX = W * 0.10;
  const topY = H * 0.10;
  const bottomY = H * 0.82;
  const usableH = bottomY - topY;

  // Attacker (left) - staggered formation
  const atkPos = [
    { x: marginX + 30, y: topY + usableH * 0.00 },
    { x: marginX + 80, y: topY + usableH * 0.15 },
    { x: marginX + 10, y: topY + usableH * 0.30 },
    { x: marginX + 90, y: topY + usableH * 0.48 },
    { x: marginX + 40, y: topY + usableH * 0.65 },
    { x: marginX + 110, y: topY + usableH * 0.82 },
  ];

  // Defender (right) - staggered formation
  const defPos = [
    { x: W - marginX - 80, y: topY + usableH * 0.05 },
    { x: W - marginX - 20, y: topY + usableH * 0.22 },
    { x: W - marginX - 60, y: topY + usableH * 0.38 },
    { x: W - marginX, y: topY + usableH * 0.55 },
    { x: W - marginX - 50, y: topY + usableH * 0.72 },
    { x: W - marginX + 10, y: topY + usableH * 0.88 },
  ];

  attackerFleet.forEach((s, i) => { if (atkPos[i]) { s.x = atkPos[i].x; s.y = atkPos[i].y; } });
  defenderFleet.forEach((s, i) => { if (defPos[i]) { s.x = defPos[i].x; s.y = defPos[i].y; } });
}

// ========================================================================
// BACKGROUND - Nebula + Stars + Grid
// ========================================================================

function initStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      size: Math.random() * 2 + 0.2,
      brightness: Math.random() * 0.7 + 0.3,
      speed: Math.random() * 0.025 + 0.004,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawBackground(t) {
  // Base
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Left nebula (purple) - prominent like reference
  const nL = ctx.createRadialGradient(W * 0.02, H * 0.35, 0, W * 0.38, H * 0.55, W * 0.58);
  nL.addColorStop(0, 'rgba(90, 30, 150, 0.4)');
  nL.addColorStop(0.25, 'rgba(70, 20, 110, 0.22)');
  nL.addColorStop(0.5, 'rgba(45, 12, 75, 0.1)');
  nL.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nL;
  ctx.fillRect(0, 0, W, H);

  // Right nebula (blue-purple)
  const nR = ctx.createRadialGradient(W * 0.98, H * 0.65, 0, W * 0.72, H * 0.45, W * 0.58);
  nR.addColorStop(0, 'rgba(45, 35, 130, 0.28)');
  nR.addColorStop(0.4, 'rgba(35, 25, 100, 0.13)');
  nR.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nR;
  ctx.fillRect(0, 0, W, H);

  // Center subtle glow
  const nC = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.38);
  nC.addColorStop(0, 'rgba(40, 18, 80, 0.1)');
  nC.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = nC;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const tw = Math.sin(t * s.speed + s.phase) * 0.35 + 0.65;
    const a = s.brightness * tw;
    ctx.fillStyle = `rgba(220,235,255,${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    if (s.size > 1.3) {
      ctx.fillStyle = `rgba(200,220,255,${a * 0.15})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawEngineTrails(fleet) {
  fleet.forEach(s => {
    if (!s.alive) return;
    const ex = s.isAttacker ? s.x - s.size * 0.7 : s.x + s.size * 0.7;
    const ey = s.y;
    const flicker = Math.sin(animTime * 0.3 + s.id) * 0.3 + 0.7;

    ctx.save();
    ctx.globalAlpha = 0.5 * flicker;
    const g = ctx.createRadialGradient(ex, ey, 0, ex, ey, s.size * 0.6);
    g.addColorStop(0, s.isAttacker ? 'rgba(80,180,255,0.8)' : 'rgba(255,160,140,0.8)');
    g.addColorStop(0.5, s.isAttacker ? 'rgba(40,120,220,0.4)' : 'rgba(220,100,80,0.4)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ex, ey, s.size * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Flickering core
    ctx.globalAlpha = 0.8 * flicker;
    ctx.fillStyle = s.isAttacker ? '#60c0ff' : '#ff9080';
    ctx.beginPath();
    ctx.arc(ex, ey, s.size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawVignette() {
  const g = ctx.createRadialGradient(W * 0.5, H * 0.5, W * 0.3, W * 0.5, H * 0.5, W * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(0.7, 'rgba(0,0,0,0.15)');
  g.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ========================================================================
// ISOMETRIC GRID
// ========================================================================

function drawGrid() {
  ctx.strokeStyle = 'rgba(35, 55, 100, 0.22)';
  ctx.lineWidth = 0.7;

  const dw = 50, dh = 28;
  const rows = Math.ceil(H / dh) + 4;
  const cols = Math.ceil(W / dw) + 4;

  for (let r = -2; r < rows; r++) {
    for (let c = -2; c < cols; c++) {
      const cx = c * dw + (r % 2) * (dw / 2);
      const cy = r * dh;
      ctx.beginPath();
      ctx.moveTo(cx, cy - dh / 2);
      ctx.lineTo(cx + dw / 2, cy);
      ctx.lineTo(cx, cy + dh / 2);
      ctx.lineTo(cx - dw / 2, cy);
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Grid intersection glow points (subtle)
  ctx.fillStyle = 'rgba(60, 100, 160, 0.06)';
  for (let r = 0; r < rows; r += 2) {
    for (let c = 0; c < cols; c += 2) {
      const cx = c * dw + (r % 2) * (dw / 2);
      const cy = r * dh;
      ctx.beginPath();
      ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ========================================================================
// SHIP SPRITES - Detailed Canvas drawings
// ========================================================================

function drawFrigate(ctx, x, y, sz, col, isAtk, flash) {
  ctx.save();
  ctx.translate(x, y);
  if (!isAtk) ctx.scale(-1, 1);
  const s = sz / 22;
  ctx.scale(s, s);

  if (flash > 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 18 * flash; }

  // Hull - sleek arrow
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(16, 0); ctx.lineTo(-6, -7); ctx.lineTo(-2, -3);
  ctx.lineTo(-14, -4); ctx.lineTo(-14, 4); ctx.lineTo(-2, 3);
  ctx.lineTo(-6, 7); ctx.closePath();
  ctx.fill();

  // Detail stripe
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.moveTo(10, -1.5); ctx.lineTo(-4, -3); ctx.lineTo(-4, 3); ctx.lineTo(10, 1.5); ctx.closePath();
  ctx.fill();

  // Cockpit glow
  ctx.fillStyle = '#90d8ff';
  ctx.beginPath();
  ctx.ellipse(3, -0.5, 3.5, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Engine
  ctx.fillStyle = '#60c8ff';
  ctx.shadowColor = '#40a0ff'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(-15, 0, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawCruiser(ctx, x, y, sz, col, isAtk, flash) {
  ctx.save();
  ctx.translate(x, y);
  if (!isAtk) ctx.scale(-1, 1);
  const s = sz / 30;
  ctx.scale(s, s);

  if (flash > 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 18 * flash; }

  // Wings
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(12, 0); ctx.lineTo(-4, -14); ctx.lineTo(-14, -12);
  ctx.lineTo(-10, -5); ctx.lineTo(-18, -4); ctx.lineTo(-18, 4);
  ctx.lineTo(-10, 5); ctx.lineTo(-14, 12); ctx.lineTo(-4, 14); ctx.closePath();
  ctx.fill();

  // Central body
  ctx.fillStyle = lighten(col, 18);
  ctx.beginPath();
  ctx.moveTo(18, 0); ctx.lineTo(-4, -6); ctx.lineTo(-16, -2.5);
  ctx.lineTo(-16, 2.5); ctx.lineTo(-4, 6); ctx.closePath();
  ctx.fill();

  // Wing stripes
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(7, -9); ctx.lineTo(-6, -9);
  ctx.moveTo(7, 9); ctx.lineTo(-6, 9);
  ctx.stroke();

  // Cockpit
  ctx.fillStyle = '#90d8ff';
  ctx.beginPath();
  ctx.ellipse(5, 0, 4.5, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Engines
  ctx.fillStyle = '#60c8ff';
  ctx.shadowColor = '#40a0ff'; ctx.shadowBlur = 7;
  ctx.beginPath();
  ctx.arc(-18, -3, 3, 0, Math.PI * 2);
  ctx.arc(-18, 3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBattleship(ctx, x, y, sz, col, isAtk, flash) {
  ctx.save();
  ctx.translate(x, y);
  if (!isAtk) ctx.scale(-1, 1);
  const s = sz / 38;
  ctx.scale(s, s);

  if (flash > 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 22 * flash; }

  // Main hull
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(24, 0); ctx.lineTo(10, -12); ctx.lineTo(-8, -16);
  ctx.lineTo(-20, -12); ctx.lineTo(-24, -5); ctx.lineTo(-24, 5);
  ctx.lineTo(-20, 12); ctx.lineTo(-8, 16); ctx.lineTo(10, 12); ctx.closePath();
  ctx.fill();

  // Upper hull
  ctx.fillStyle = lighten(col, 12);
  ctx.beginPath();
  ctx.moveTo(12, -7); ctx.lineTo(-4, -11); ctx.lineTo(-16, -9);
  ctx.lineTo(-18, -3); ctx.lineTo(-18, 3); ctx.lineTo(-16, 9);
  ctx.lineTo(-4, 11); ctx.lineTo(12, 7); ctx.closePath();
  ctx.fill();

  // Turrets
  ctx.fillStyle = lighten(col, 28);
  ctx.fillRect(10, -3.5, 11, 2.5);
  ctx.fillRect(10, 1, 11, 2.5);
  ctx.fillRect(-4, -6, 9, 2);
  ctx.fillRect(-4, 4, 9, 2);
  ctx.fillRect(-20, -2.5, 7, 1.8);
  ctx.fillRect(-20, 0.7, 7, 1.8);

  // Detail lines
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(20, -10); ctx.lineTo(-6, -14);
  ctx.moveTo(20, 10); ctx.lineTo(-6, 14);
  ctx.moveTo(2, -16); ctx.lineTo(2, 16);
  ctx.stroke();

  // Bridge
  ctx.fillStyle = '#a0e8ff';
  ctx.beginPath();
  ctx.ellipse(4, 0, 5.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();

  // Triple engines
  ctx.fillStyle = '#60c8ff';
  ctx.shadowColor = '#40a0ff'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(-24, -6, 3.5, 0, Math.PI * 2);
  ctx.arc(-24, 0, 4, 0, Math.PI * 2);
  ctx.arc(-24, 6, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawShipSprite(ship) {
  if (!ship.alive && ship.hitFlash <= 0) return;
  ctx.globalAlpha = ship.alive ? 1 : Math.max(0, ship.hitFlash * 0.4);

  const col = ship.hitFlash > 0.25 ? '#ffffff' : (ship.attacking ? lighten(ship.isAttacker ? '#3088e0' : '#d0a0a0', 35) : (ship.isAttacker ? '#3088e0' : '#d0a0a0'));

  switch (ship.type) {
    case 'FRIGATE': drawFrigate(ctx, ship.x, ship.y, ship.size, col, ship.isAttacker, ship.hitFlash); break;
    case 'CRUISER': drawCruiser(ctx, ship.x, ship.y, ship.size, col, ship.isAttacker, ship.hitFlash); break;
    case 'BATTLESHIP': drawBattleship(ctx, ship.x, ship.y, ship.size, col, ship.isAttacker, ship.hitFlash); break;
  }

  if (ship.alive) drawShipNumber(ship);
  ctx.globalAlpha = 1;
}

function drawShipNumber(ship) {
  const c = Math.ceil(ship.hp / ship.maxHp * ship.maxCount);
  const txt = c >= 1000 ? Math.round(c/100) / 10 + 'k' : c.toString();

  ctx.font = 'bold 12px "Orbitron", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillText(txt, ship.x + 1, ship.y + ship.size / 2 + 5);
  ctx.fillText(txt, ship.x - 1, ship.y + ship.size / 2 + 5);
  ctx.fillText(txt, ship.x, ship.y + ship.size / 2 + 6);

  ctx.fillStyle = ship.isAttacker ? '#70c0ff' : '#ffb0b0';
  ctx.fillText(txt, ship.x, ship.y + ship.size / 2 + 5);
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, ((n>>16)&0xff)+amt);
  const g = Math.min(255, ((n>>8)&0xff)+amt);
  const b = Math.min(255, (n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// ========================================================================
// PROJECTILES
// ========================================================================

function spawnProjectile(from, to) {
  const defs = {
    ballistic: { color: '#f0d840', speed: 10, size: 2.5, kind: 'bullet' },
    directional: { color: '#ff4040', speed: 16, size: 2, kind: 'laser' },
    missile: { color: '#ff8020', speed: 5.5, size: 4.5, kind: 'missile' },
    shipbased: { color: '#40ff80', speed: 3.5, size: 7, kind: 'orb' },
  };
  const d = defs[from.attackType] || defs.ballistic;

  projectiles.push({
    x: from.x, y: from.y,
    tx: to.x, ty: to.y,
    target: to,
    speed: d.speed * (0.85 + Math.random() * 0.3),
    color: d.color, size: d.size, kind: d.kind,
    trail: [], life: 300,
    from,
  });
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const dist = Math.hypot(dx, dy);

    if (dist < p.speed * speed || p.life-- <= 0) {
      // HIT
      spawnExplosion(p.tx, p.ty, p.color);
      p.target.hitFlash = 1;

      const dmg = Math.floor(p.from.damage * (0.8 + Math.random() * 0.4));
      p.target.hp -= dmg;
      if (p.target.hp <= 0) { p.target.hp = 0; p.target.alive = false; }

      spawnDamageText(p.tx, p.ty - 25, dmg, p.color);
      projectiles.splice(i, 1);
      continue;
    }

    p.x += (dx / dist) * p.speed * speed;
    p.y += (dy / dist) * p.speed * speed;

    if (p.kind !== 'laser') {
      p.trail.push({ x: p.x, y: p.y, a: 1 });
      if (p.trail.length > 12) p.trail.shift();
    }

    if (p.kind === 'missile' && Math.random() > 0.4) {
      particles.push({
        x: p.x, y: p.y,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
        life: 1, decay: 0.035, size: Math.random()*5+2,
        color: 'rgba(100,100,100,',
      });
    }
  }
}

function drawProjectiles() {
  projectiles.forEach(p => {
    // Trail
    p.trail.forEach((pt, i) => {
      pt.a -= 0.07;
      if (pt.a <= 0) return;
      ctx.globalAlpha = pt.a * 0.5;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, p.size * pt.a * 0.5, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (p.kind === 'laser') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = p.color; ctx.shadowBlur = 12;
      const a = Math.atan2(p.ty - p.y, p.tx - p.x);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - Math.cos(a)*28, p.y - Math.sin(a)*28);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else if (p.kind === 'orb') {
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.35, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    } else if (p.kind === 'missile') {
      ctx.fillStyle = p.color;
      ctx.shadowColor = '#ff6020'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // Bullet
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 8;
      const a = Math.atan2(p.ty - p.y, p.tx - p.x);
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0, 0, 7, 2.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0;
    }
  });
}

// ========================================================================
// EXPLOSIONS & PARTICLES
// ========================================================================

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 4 + 0.8;
    particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 1, decay: Math.random()*0.04+0.02,
      size: Math.random()*5+2, color: `rgba(${hexToRgb(color)},`,
    });
  }
  explosions.push({ x, y, r: 4, maxR: 28, life: 1 });
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)].join(',');
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * speed; p.y += p.vy * speed;
    p.life -= p.decay * speed;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = explosions.length-1; i >= 0; i--) {
    const e = explosions[i];
    e.r += 1.8 * speed;
    e.life -= 0.055 * speed;
    if (e.life <= 0) explosions.splice(i, 1);
  }
}

function drawParticles() {
  explosions.forEach(e => {
    ctx.strokeStyle = `rgba(255,200,50,${e.life*0.7})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = `rgba(255,140,30,${e.life*0.25})`;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r*0.55, 0, Math.PI*2); ctx.fill();
  });
  particles.forEach(p => {
    ctx.fillStyle = p.color + p.life + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ========================================================================
// DAMAGE TEXT (DOM)
// ========================================================================

function spawnDamageText(x, y, dmg, color) {
  const el = document.createElement('div');
  el.className = 'floating-damage';
  el.textContent = '-' + dmg;
  el.style.color = color;
  el.style.position = 'fixed';
  el.style.zIndex = '1000';

  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / W;
  const sy = canvas.height / H;
  el.style.left = (rect.left + x * sx) + 'px';
  el.style.top = (rect.top + y * sy) + 'px';

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// ========================================================================
// COMBAT SYSTEM - Sequential squadron attacks
// ========================================================================

let combat = { phase: 'IDLE', idx: 0, ships: [], delay: 0, timer: 0 };

function startCombat() {
  phase = 'ATTACKING';
  combat.phase = 'FIRING';
  combat.idx = 0;
  combat.delay = 45;
  combat.timer = 0;

  const all = [];
  attackerFleet.filter(s=>s.alive).forEach(s=>all.push(s));
  defenderFleet.filter(s=>s.alive).forEach(s=>all.push(s));

  // Order: BS -> Cruiser -> Frigate (heaviest first, like GO2)
  const ord = { BATTLESHIP: 0, CRUISER: 1, FRIGATE: 2 };
  all.sort((a, b) => ord[a.type] - ord[b.type] || (a.isAttacker ? -1 : 1));

  combat.ships = all;
  updateStats();
}

function updateCombat() {
  if (paused || phase !== 'ATTACKING') return;
  combat.timer += speed;

  if (combat.phase === 'FIRING') {
    if (combat.delay > 0) { combat.delay -= speed; return; }

    if (combat.idx >= combat.ships.length) {
      combat.phase = 'BETWEEN';
      combat.delay = 100;
      return;
    }

    const ship = combat.ships[combat.idx];
    if (!ship.alive) { combat.idx++; return; }

    const targets = ship.isAttacker
      ? defenderFleet.filter(s=>s.alive)
      : attackerFleet.filter(s=>s.alive);
    if (targets.length === 0) { combat.idx++; return; }

    const target = targets[Math.floor(Math.random()*targets.length)];

    ship.attacking = true;
    spawnProjectile(ship, target);

    // Extra projectiles for bigger ships
    const extra = ship.type === 'BATTLESHIP' ? 2 : ship.type === 'CRUISER' ? 1 : 0;
    for (let e = 0; e < extra; e++) {
      setTimeout(() => { if (target.alive) spawnProjectile(ship, target); }, (80 + e*60) / speed);
    }

    combat.idx++;
    combat.delay = 40 / speed;
    setTimeout(() => { ship.attacking = false; }, 350 / speed);
  } else if (combat.phase === 'BETWEEN') {
    combat.delay -= speed;
    if (combat.delay <= 0) nextRound();
  }
}

function nextRound() {
  const aAlive = attackerFleet.filter(s=>s.alive).length;
  const dAlive = defenderFleet.filter(s=>s.alive).length;

  if (aAlive === 0 || dAlive === 0 || round >= MAX_ROUNDS) {
    finishBattle(aAlive, dAlive);
    return;
  }

  const aHp = attackerFleet.reduce((s,x)=>s+x.hp,0);
  const dHp = defenderFleet.reduce((s,x)=>s+x.hp,0);
  const aMax = attackerFleet.reduce((s,x)=>s+x.maxHp,0);
  const dMax = defenderFleet.reduce((s,x)=>s+x.maxHp,0);

  roundWinners[round-1] = (aHp/aMax) > (dHp/dMax) ? 'left' : 'right';
  round++;
  updateUI();
  startCombat();
}

function finishBattle(aAlive, dAlive) {
  phase = 'FINISHED';
  const winner = aAlive > dAlive ? 'SandoraD' : 'L3g3ndMX';
  showPhase('VICTORIA: ' + winner);
  updateStats();
}

function showPhase(text) {
  const el = document.getElementById('phaseIndicator');
  el.textContent = text;
  el.style.display = 'block';
  el.classList.remove('animating');
  void el.offsetWidth;
  el.classList.add('animating');
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ========================================================================
// DRAW LOOP
// ========================================================================

function drawGlows(fleet) {
  fleet.forEach(s => {
    if (!s.attacking) return;
    ctx.save();
    ctx.globalAlpha = 0.2 + Math.sin(animTime*0.15)*0.1;
    const g = ctx.createRadialGradient(s.x, s.y, 2, s.x, s.y, s.size + 14);
    g.addColorStop(0, 'rgba(240,192,64,0.5)');
    g.addColorStop(1, 'rgba(240,192,64,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size+14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function updateFlashes() {
  [...attackerFleet, ...defenderFleet].forEach(s => {
    if (s.hitFlash > 0) s.hitFlash -= 0.035 * speed;
  });
}

function updateHpBars() {
  const aHp = attackerFleet.reduce((s,x)=>s+x.hp,0);
  const dHp = defenderFleet.reduce((s,x)=>s+x.hp,0);
  const aMax = attackerFleet.reduce((s,x)=>s+x.maxHp,0);
  const dMax = defenderFleet.reduce((s,x)=>s+x.maxHp,0);

  const lPct = Math.max(3, (aHp/aMax)*100);
  const rPct = Math.max(3, (dHp/dMax)*100);
  const total = lPct + rPct;

  document.getElementById('hpBarLeft').style.width = (lPct/total*100) + '%';
  document.getElementById('hpBarRight').style.width = (rPct/total*100) + '%';
  document.getElementById('hpText').textContent = Math.round(lPct) + '% vs ' + Math.round(rPct) + '%';
  document.getElementById('hpValueLeft').textContent = fmt(aHp) + ' / ' + fmt(aMax);
  document.getElementById('hpValueRight').textContent = fmt(dHp) + ' / ' + fmt(dMax);
}

function fmt(n) { return n.toLocaleString('en-US'); }

function update() {
  animTime++;
  updateCombat();
  updateProjectiles();
  updateParticles();
  updateFlashes();
  updateHpBars();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(animTime);
  drawGrid();
  drawEngineTrails(attackerFleet);
  drawEngineTrails(defenderFleet);
  drawGlows(attackerFleet);
  drawGlows(defenderFleet);
  attackerFleet.forEach(s => drawShipSprite(s));
  defenderFleet.forEach(s => drawShipSprite(s));
  drawProjectiles();
  drawParticles();
  drawVignette();
}

function loop() {
  if (!paused) { update(); draw(); }
  requestAnimationFrame(loop);
}

// ========================================================================
// UI
// ========================================================================

function updateUI() {
  document.getElementById('roundBadge').textContent = 'RONDA ' + round;
  updateTimeline();
}

function updateStats() {
  const aA = attackerFleet.filter(s=>s.alive).length;
  const dA = defenderFleet.filter(s=>s.alive).length;
  const ph = { IDLE:'Preparando', ATTACKING:'En combate', FINISHED:'Finalizado' };
  document.getElementById('statPhase').textContent = ph[phase] || phase;
  document.getElementById('statRound').textContent = round + ' / ' + MAX_ROUNDS;
  document.getElementById('statShipsLeft').textContent = aA;
  document.getElementById('statShipsRight').textContent = dA;
  document.getElementById('statSpeed').textContent = speed + 'x';
}

function updateTimeline() {
  const t = document.getElementById('timeline');
  t.innerHTML = '';
  for (let i = 1; i <= MAX_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'timeline-dot';
    d.textContent = i;
    if (i === round) d.classList.add('current');
    else if (i < round && roundWinners[i-1]) d.classList.add('won-' + roundWinners[i-1]);
    t.appendChild(d);
  }
}

// ========================================================================
// CONTROLS
// ========================================================================

document.getElementById('btnPause').onclick = () => {
  paused = true;
  document.getElementById('btnPause').classList.add('active');
  document.getElementById('btnPlay').classList.remove('active');
};
document.getElementById('btnPlay').onclick = () => {
  paused = false;
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('btnPause').classList.remove('active');
};
document.getElementById('btnSpeed').onclick = function() {
  speed = speed === 1 ? 2 : speed === 2 ? 4 : 1;
  this.textContent = speed + 'x';
  updateStats();
};
document.getElementById('btnRestart').onclick = resetBattle;
let soundOn = true;
document.getElementById('btnSound').onclick = function() {
  soundOn = !soundOn;
  this.innerHTML = soundOn ? '&#128264;' : '&#128263;';
};

function resetBattle() {
  round = 1; phase = 'IDLE'; paused = false;
  projectiles = []; particles = []; explosions = [];
  combat = { phase:'IDLE', idx:0, ships:[], delay:0, timer:0 };
  roundWinners = [];
  attackerFleet = createFleet(true);
  defenderFleet = createFleet(false);
  computePositions();
  document.getElementById('btnPlay').classList.add('active');
  document.getElementById('btnPause').classList.remove('active');
  updateUI(); updateStats();
  showPhase('RONDA 1');
  setTimeout(startCombat, 1200);
}

// ========================================================================
// RESIZE & INIT
// ========================================================================

function resize() {
  const r = container.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W; canvas.height = H;
  computePositions();
  initStars();
}

window.addEventListener('resize', resize);

resize();
updateUI();
updateStats();
showPhase('RONDA 1');
setTimeout(startCombat, 1200);
loop();
</script>
</body>
</html>
