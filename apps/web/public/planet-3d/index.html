<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galaxy Online 3 — Planeta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050a14;font-family:system-ui,sans-serif}
#gameCanvas{position:absolute;top:0;left:240px;right:0;bottom:0;display:block}
#panel{position:absolute;left:0;top:0;bottom:0;width:240px;background:linear-gradient(180deg,#0a1428,#0d1f3c);border-right:2px solid #1a3a5c;display:flex;flex-direction:column;overflow:hidden}
#res{padding:12px 10px;border-bottom:1px solid #1a3a5c}
#res h3{font-size:10px;color:#5a7a9a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.r{display:flex;gap:6px;flex-wrap:wrap}
.rb{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:bold}
#tabs{display:flex;border-bottom:1px solid #1a3a5c}
.t{flex:1;padding:8px;border:none;background:transparent;color:#5a7a9a;font-size:10px;font-weight:bold;text-transform:uppercase;cursor:pointer;letter-spacing:0.5px;border-bottom:2px solid transparent}
.t.active{color:#4a9eff;border-bottom-color:#4a9eff;background:rgba(74,158,255,0.05)}
.t:hover{color:#8bb3d9}
#list{flex:1;overflow-y:auto;padding:8px}
.it{width:100%;padding:7px 8px;margin-bottom:4px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);color:#e0e8f0;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s}
.it:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
.it.sel{border-color:#4a9eff;box-shadow:0 0 8px rgba(74,158,255,0.25)}
.it .ico{font-size:18px}
.it .n{font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.it .c{font-size:9px;color:#7a9aba}
.it.disabled{opacity:0.35;cursor:not-allowed}
#btns{padding:8px;border-top:1px solid #1a3a5c;display:flex;gap:6px}
.ab{flex:1;padding:7px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);font-size:10px;font-weight:bold;cursor:pointer;color:#e0e8f0;background:rgba(255,255,255,0.05)}
#err{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(180,30,30,0.9);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:100;display:none;max-width:80%;text-align:center}
#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,20,40,0.95);border:1px solid #2a4a6c;color:#8bb3d9;padding:8px 16px;border-radius:8px;font-size:12px;z-index:50;display:none;white-space:nowrap}
#load{position:absolute;inset:0;background:#050a14;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8bb3d9;z-index:200;transition:opacity 0.5s}
#load .sp{width:40px;height:40px;border:3px solid #1a3a5c;border-top-color:#4a9eff;border-radius:50%;animation:sp 1s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="load"><div class="sp"></div><div>Cargando planeta...</div></div>
<div id="err"></div>
<div id="hint"></div>
<div id="panel">
  <div id="res"><h3>Recursos</h3><div class="r">
    <div class="rb" style="color:#f59e0b">M <span id="rM">15000</span></div>
    <div class="rb" style="color:#22c55e">E <span id="rE">12000</span></div>
    <div class="rb" style="color:#3b82f6">C <span id="rC">10000</span></div>
  </div></div>
  <div id="tabs">
    <button class="t active" onclick="switchTab(0)">Edificios</button>
    <button class="t" onclick="switchTab(1)">Naves</button>
    <button class="t" onclick="switchTab(2)">Props</button>
  </div>
  <div id="list"></div>
  <div id="btns">
    <button class="ab" style="background:rgba(220,38,38,0.15);color:#fca5a5" onclick="resetMap()">Reset</button>
  </div>
</div>
<canvas id="gameCanvas"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===== ERROR HANDLING =====
window.onerror = (msg, src, line) => { showErr(msg + ' line:' + line); };
function showErr(m) { console.error(m); const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }
function showHint(m) { const h = document.getElementById('hint'); h.textContent = m; h.style.display = 'block'; }
function hideHint() { document.getElementById('hint').style.display = 'none'; }

// ===== CATALOG =====
const CATS = [
  { tab: 'Edificios', items: [
    { id: 'metal_mine', name: 'Mina de Metal', icon: '\u26CF', cost: {m: 120, e: 40, c: 20}, max: 99, glb: '/models/buildings/metal_mine.glb', sc: 0.7 },
    { id: 'power_plant', name: 'Planta de Energia', icon: '\u26A1', cost: {m: 200, e: 80, c: 60}, max: 99, glb: '/models/buildings/power_plant.glb', sc: 0.8 },
    { id: 'warehouse', name: 'Almacen', icon: '\uD83D\uDCE6', cost: {m: 150, e: 50, c: 100}, max: 99, glb: '/models/buildings/warehouse.glb', sc: 0.65 },
    { id: 'shipyard', name: 'Astillero', icon: '\uD83D\uDE80', cost: {m: 800, e: 400, c: 300}, max: 2, glb: '/models/buildings/shipyard.glb', sc: 0.6 },
    { id: 'command_center', name: 'Centro de Comando', icon: '\uD83C\uDFDB', cost: {m: 500, e: 300, c: 250}, max: 1, glb: '/models/buildings/command_center.glb', sc: 0.8 },
  ]},
  { tab: 'Naves', items: [
    { id: 'fighter', name: 'Caza Ligero', icon: '\u2708', cost: {m: 300, e: 150, c: 100}, max: 20, glb: '/models/ships/fighter.glb', sc: 0.5 },
    { id: 'frigate', name: 'Fragata', icon: '\uD83D\uDEE5', cost: {m: 600, e: 300, c: 200}, max: 10, glb: '/models/ships/frigate.glb', sc: 0.5 },
    { id: 'cruiser', name: 'Crucero', icon: '\uD83D\uDEA2', cost: {m: 1000, e: 500, c: 400}, max: 5, glb: '/models/ships/cruiser.glb', sc: 0.45 },
    { id: 'battleship', name: 'Acorazado', icon: '\u2693', cost: {m: 2000, e: 1000, c: 800}, max: 2, glb: '/models/ships/battleship.glb', sc: 0.4 },
  ]},
  { tab: 'Props', items: [
    { id: 'dome', name: 'Domo', icon: '\uD83C\uDF10', cost: {m: 80, e: 20, c: 10}, max: 50, glb: '/models/props/dome.glb', sc: 0.8 },
    { id: 'solar_array', name: 'Panel Solar', icon: '\u2600', cost: {m: 50, e: 10, c: 5}, max: 50, glb: '/models/props/solar_array.glb', sc: 0.7 },
    { id: 'antenna', name: 'Antena', icon: '\uD83D\uDCE1', cost: {m: 40, e: 30, c: 20}, max: 50, glb: '/models/props/antenna.glb', sc: 0.8 },
    { id: 'radar', name: 'Radar', icon: '\uD83D\uDCF6', cost: {m: 60, e: 40, c: 10}, max: 30, glb: '/models/props/radar.glb', sc: 0.8 },
    { id: 'rock_large', name: 'Roca', icon: '\uD83E\uDEA8', cost: {m: 0, e: 0, c: 0}, max: 99, glb: '/models/props/rock_large.glb', sc: 1.0 },
    { id: 'planet_small', name: 'Planeta Deco', icon: '\uD83D\uDE90', cost: {m: 0, e: 0, c: 0}, max: 10, glb: '/models/props/planet_small.glb', sc: 0.6 },
  ]},
];
const ALL = CATS.flatMap(c => c.items);
function getDef(id) { return ALL.find(x => x.id === id); }

// ===== STATE =====
let R = { m: 15000, e: 12000, c: 10000 };
let placed = []; // { id, typeId, col, row, rot }
let selectedId = null; // current item being placed
let selRot = 0;
let ghost = null; // ghost mesh
let curTab = 0;
const SK = 'go3c_v1';

function loadState() { try { const d = JSON.parse(localStorage.getItem(SK)); if (d) { R = d.R || R; placed = d.placed || placed; } } catch (e) {} }
function saveState() { localStorage.setItem(SK, JSON.stringify({ R, placed })); }
function canAff(it) { return R.m >= it.cost.m && R.e >= it.cost.e && R.c >= it.cost.c; }
function cntType(id) { return placed.filter(p => p.typeId === id).length; }

// ===== THREE.JS SETUP =====
const canvas = document.getElementById('gameCanvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a14);
scene.fog = new THREE.Fog(0x050a14, 80, 200);

const camera = new THREE.PerspectiveCamera(35, canvas.clientWidth / canvas.clientHeight, 0.1, 500);
camera.position.set(18, 14, 18);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 60;

// ===== LIGHTING =====
scene.add(new THREE.AmbientLight(0xfff0dd, 0.8));
scene.add(new THREE.HemisphereLight(0xffeedd, 0x3a3020, 0.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.8);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -35; sun.shadow.camera.right = 35;
sun.shadow.camera.top = -35; sun.shadow.camera.bottom = -35;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 80;
sun.shadow.bias = -0.0005;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x99bbff, 0.4);
fill.position.set(-10, 5, -8);
scene.add(fill);

// ===== TERRAIN =====
const GRID_C = 12, GRID_R = 10;
const CW = 3.8, CH = 2.2;
const OX = -(GRID_C * CW) / 2;
const OZ = -(GRID_R * CH) / 2;

const tGeo = new THREE.PlaneGeometry(60, 40);
const tMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.95, metalness: 0.0 });
// Add subtle texture-like variation via vertex colors
const tc = new Float32Array(tGeo.attributes.position.count * 3);
for (let i = 0; i < tc.length; i += 3) {
  const r = 0.6 + Math.random() * 0.15;
  tc[i] = r; tc[i + 1] = r * 0.85; tc[i + 2] = r * 0.6;
}
tGeo.setAttribute('color', new THREE.BufferAttribute(tc, 3));
tMat.vertexColors = true;
tMat.needsUpdate = true;

const terrain = new THREE.Mesh(tGeo, tMat);
terrain.rotation.x = -Math.PI / 2;
terrain.position.y = -0.5;
terrain.receiveShadow = true;
scene.add(terrain);

// Grid lines
const gPts = [];
for (let c = 0; c <= GRID_C; c++) { gPts.push(OX + c * CW, 0.01, OZ); gPts.push(OX + c * CW, 0.01, OZ + GRID_R * CH); }
for (let r = 0; r <= GRID_R; r++) { gPts.push(OX, 0.01, OZ + r * CH); gPts.push(OX + GRID_C * CW, 0.01, OZ + r * CH); }
const gGeo = new THREE.BufferGeometry();
gGeo.setAttribute('position', new THREE.Float32BufferAttribute(gPts, 3));
const gMat = new THREE.LineBasicMaterial({ color: 0x4a3c2a, transparent: true, opacity: 0.3 });
scene.add(new THREE.LineSegments(gGeo, gMat));

// Cell highlight cursor
const hlGeo = new THREE.BoxGeometry(CW * 0.9, 0.05, CH * 0.9);
const hlMat = new THREE.MeshBasicMaterial({ color: 0x4a9eff, transparent: true, opacity: 0 });
const highlight = new THREE.Mesh(hlGeo, hlMat);
scene.add(highlight);

// ===== COORD CONVERSION =====
function w2g(wx, wz) {
  const c = Math.floor((wx - OX) / CW);
  const r = Math.floor((wz - OZ) / CH);
  if (c < 0 || r < 0 || c >= GRID_C || r >= GRID_R) return null;
  return { col: c, row: r };
}
function g2w(col, row) {
  return [OX + col * CW + CW / 2, 0, OZ + row * CH + CH / 2];
}
function occMap() {
  const m = new Set();
  for (const p of placed) m.add(p.col + ',' + p.row);
  return m;
}

// ===== GLB LOADING =====
const loader = new GLTFLoader();
const cache = {};

async function loadGlb(path) {
  if (cache[path]) return cache[path].clone();
  return new Promise((resolve, reject) => {
    loader.load(path, (gltf) => {
      const scene_gltf = gltf.scene;
      // Fix materials
      scene_gltf.traverse(ch => {
        if (ch.isMesh && ch.material) {
          ch.castShadow = true;
          ch.receiveShadow = true;
          const m = ch.material.clone();
          m.metalness = Math.min(m.metalness || 0, 0.2);
          m.roughness = Math.max(m.roughness || 0.5, 0.6);
          m.emissive = new THREE.Color(0x000000);
          m.emissiveIntensity = 0;
          m.needsUpdate = true;
          ch.material = m;
        }
      });
      cache[path] = scene_gltf;
      resolve(scene_gltf.clone());
    }, undefined, reject);
  });
}

// ===== PLACE / REMOVE BUILDING =====
async function placeItem(typeId, col, row, rot) {
  const def = getDef(typeId);
  if (!def) return;
  try {
    const mesh = await loadGlb(def.glb);
    mesh.scale.setScalar(def.sc);
    const [x, y, z] = g2w(col, row);
    mesh.position.set(x, y, z);
    mesh.rotation.y = rot * Math.PI / 180;
    mesh.userData = { key: typeId + '_' + col + '_' + row };
    scene.add(mesh);
  } catch (e) { showErr('Error cargando ' + def.name + ': ' + e.message); }
}

function removeVisual(col, row) {
  const key = placed.find(p => p.col === col && p.row === row)?.typeId + '_' + col + '_' + row;
  if (!key) return;
  scene.traverse(ch => {
    if (ch.userData && ch.userData.key === key) {
      scene.remove(ch);
    }
  });
}

// ===== SHIELD EFFECT =====
function spawnShield(pos) {
  const g = new THREE.SphereGeometry(1.2, 16, 16);
  const m = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.15, wireframe: true, blending: THREE.AdditiveBlending, depthWrite: false });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(pos[0], pos[1] + 1, pos[2]);
  scene.add(mesh);
  let t = 0;
  function anim() {
    t += 0.02;
    m.opacity = 0.15 * Math.max(0, 1 - t);
    mesh.scale.setScalar(1 + t * 0.5);
    if (t < 1) requestAnimationFrame(anim);
    else { scene.remove(mesh); g.dispose(); m.dispose(); }
  }
  anim();
}

// ===== INPUT =====
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getPoint(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObject(terrain);
  return hits.length > 0 ? hits[0].point : null;
}

canvas.addEventListener('pointermove', e => {
  if (!selectedId) { highlight.visible = false; return; }
  const pt = getPoint(e.clientX, e.clientY);
  if (!pt) { highlight.visible = false; return; }
  const g = w2g(pt.x, pt.z);
  if (!g) { highlight.visible = false; return; }
  const [x, y, z] = g2w(g.col, g.row);
  highlight.position.set(x, y + 0.02, z);
  highlight.visible = true;
  const occupied = occMap().has(g.col + ',' + g.row);
  hlMat.color.setHex(occupied ? 0xff4444 : 0x44ff44);
  hlMat.opacity = 0.3;
  // Update ghost
  if (ghost) { ghost.position.set(x, y, z); ghost.visible = true; }
});

canvas.addEventListener('click', async e => {
  if (!selectedId) return;
  const pt = getPoint(e.clientX, e.clientY);
  if (!pt) return;
  const g = w2g(pt.x, pt.z);
  if (!g) return;
  const def = getDef(selectedId);
  if (!def) return;
  if (occMap().has(g.col + ',' + g.row)) { showHint('Celda ocupada'); setTimeout(hideHint, 1500); return; }
  if (!canAff(def)) { showHint('Sin recursos'); setTimeout(hideHint, 1500); return; }
  if (cntType(def.id) >= def.max) { showHint('Limite alcanzado'); setTimeout(hideHint, 1500); return; }

  // Spend
  R.m -= def.cost.m; R.e -= def.cost.e; R.c -= def.cost.c;
  placed.push({ typeId: def.id, col: g.col, row: g.row, rot: selRot });
  await placeItem(def.id, g.col, g.row, selRot);
  spawnShield(g2w(g.col, g.row));
  saveState();
  updateUI();
  showHint(def.name + ' construido!');
  setTimeout(hideHint, 1500);
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const pt = getPoint(e.clientX, e.clientY);
  if (!pt) return;
  const g = w2g(pt.x, pt.z);
  if (!g) return;
  const occ = occMap();
  if (!occ.has(g.col + ',' + g.row)) return;
  const idx = placed.findIndex(p => p.col === g.col && p.row === g.row);
  if (idx === -1) return;
  const p = placed[idx];
  const def = getDef(p.typeId);
  if (def) { R.m += def.cost.m * 0.5; R.e += def.cost.e * 0.5; R.c += def.cost.c * 0.5; }
  removeVisual(g.col, g.row);
  placed.splice(idx, 1);
  saveState();
  updateUI();
});

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') { selectedId = null; hideHint(); if (ghost) { scene.remove(ghost); ghost = null; } highlight.visible = false; updateUI(); }
  if ((e.key === 'r' || e.key === 'R') && selectedId) { selRot = (selRot + 90) % 360; showHint('Rotacion ' + selRot + '\u00B0'); setTimeout(hideHint, 1000); if (ghost) ghost.rotation.y = selRot * Math.PI / 180; }
});

window.addEventListener('resize', () => {
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
});

// ===== UI =====
function buildUI() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  const cat = CATS[curTab];
  cat.items.forEach(it => {
    const btn = document.createElement('button');
    btn.className = 'it' + (selectedId === it.id ? ' sel' : '');
    const n = cntType(it.id);
    btn.innerHTML = `<span class="ico">${it.icon}</span><div style="flex:1;min-width:0"><div class="n">${it.name}</div><div class="c">${it.cost.m}M ${it.cost.e}E ${it.cost.c}C${n > 0 ? ' (' + n + '/' + it.max + ')' : ''}</div></div>`;
    btn.onclick = () => selectItem(it.id);
    if (!canAff(it) || n >= it.max) btn.classList.add('disabled');
    list.appendChild(btn);
  });
}

window.switchTab = function(t) {
  curTab = t;
  document.querySelectorAll('.t').forEach((b, i) => b.classList.toggle('active', i === t));
  buildUI();
};

async function selectItem(id) {
  const def = getDef(id);
  if (!def) return;
  if (!canAff(def)) return;
  if (cntType(def.id) >= def.max) return;
  selectedId = id;
  selRot = 0;
  showHint(`${def.name}: click para colocar | R rotar | ESC cancelar | click derecho en edificio para eliminar`);
  // Create ghost
  if (ghost) { scene.remove(ghost); ghost = null; }
  try {
    const g = await loadGlb(def.glb);
    g.scale.setScalar(def.sc);
    g.traverse(ch => {
      if (ch.isMesh && ch.material) {
        ch.material = ch.material.clone();
        ch.material.transparent = true;
        ch.material.opacity = 0.4;
        ch.material.needsUpdate = true;
      }
    });
    scene.add(g);
    ghost = g;
  } catch (e) {}
  buildUI();
}

window.resetMap = function() {
  if (!confirm('Eliminar todos los edificios?')) return;
  placed.forEach(p => removeVisual(p.col, p.row));
  placed = [];
  R = { m: 15000, e: 12000, c: 10000 };
  saveState();
  updateUI();
};

function updateUI() {
  document.getElementById('rM').textContent = R.m.toLocaleString();
  document.getElementById('rE').textContent = R.e.toLocaleString();
  document.getElementById('rC').textContent = R.c.toLocaleString();
  buildUI();
}

// ===== INIT =====
async function init() {
  loadState();
  updateUI();
  // Place saved
  for (const p of placed) await placeItem(p.typeId, p.col, p.row, p.rot);
  document.getElementById('load').style.opacity = '0';
  setTimeout(() => document.getElementById('load').style.display = 'none', 500);
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

init().catch(e => showErr('Init: ' + e.message));
</script>
</body>
</html>
